<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="view a lexiconic. product and begin checkout.">
  <link rel="canonical" href="https://lexiconic.global/menu/product.html">
  <meta property="og:site_name" content="lexiconic.">
  <meta property="og:title" content="product.">
  <meta property="og:description" content="view a lexiconic. product and begin checkout.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://lexiconic.global/menu/product.html">
  <meta property="og:image" content="https://lexiconic.global/images/lexiconic%20torus.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="product.">
  <meta name="twitter:description" content="view a lexiconic. product and begin checkout.">
  <meta name="twitter:image" content="https://lexiconic.global/images/lexiconic%20torus.png">
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "product.",
      "url": "https://lexiconic.global/menu/product.html",
      "description": "view a lexiconic. product and begin checkout."
    }
  </script>
  <link rel="icon" type="image/png" sizes="16x16" href="../images/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="../images/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="48x48" href="../images/favicon-48x48.png">
  <link rel="icon" type="image/png" sizes="96x96" href="../images/favicon-96x96.png">
  <link rel="stylesheet" href="../css/descriptions.css">
  <script src="../js/tap_glow.js" defer></script>
  <link rel="stylesheet" href="../css/static_circle.css">
  <style>
    .product-detail-layout {
      width: calc(100% - 6%);
      margin: 50px 3% 32px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .detail-card {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .detail-box {
      width: 100%;
      aspect-ratio: 1 / 1;
      border: 1px solid #ffffff;
      border-radius: var(--radius-sm);
      background-color: #000000;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
    }

    .detail-image {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      object-position: center;
    }

    .detail-meta,
    .detail-fallback {
      margin: 0;
      text-align: center;
      color: #ffffff;
      font-size: calc(var(--fs-input-field) - 1px);
      font-family: "Sora", "Avenir Next", "Roboto", "SF Pro", "Segoe UI", "Times New Roman", serif;
      font-style: italic;
      font-weight: 300;
      line-height: 1.3;
    }

    .detail-checkout {
      width: 100%;
      max-width: 320px;
      min-height: 44px;
      margin-top: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      border: 1px solid #ffffff;
      border-radius: var(--radius-md);
      background-color: #ffffff;
      color: #000000;
      text-align: center;
      box-sizing: border-box;
      font-size: var(--fs-input-field);
      font-family: "Sora", "Avenir Next", "Roboto", "SF Pro", "Segoe UI", "Times New Roman", serif;
      font-style: italic;
      font-weight: 400;
      text-shadow: none;
      box-shadow: none;
    }

    .detail-checkout:hover,
    .detail-checkout:focus,
    .detail-checkout:active,
    .detail-checkout.tap-active,
    .detail-checkout:visited {
      color: #000000;
      font-style: italic;
      font-weight: 400;
      text-shadow: none;
      box-shadow: none;
    }

    .detail-fallback {
      max-width: 420px;
    }

    .detail-hidden {
      display: none;
    }
  </style>
</head>
<body class="logo-adjusted shop-page">
  <a href="/" class="circle"></a>
  <div class="logo-spacer"></div>

  <div class="product-detail-layout">
    <div class="detail-card detail-hidden" id="detail-card">
      <a class="detail-box" id="detail-image-link" href="">
        <img class="detail-image" id="detail-image" src="" alt="" loading="eager">
      </a>
      <p class="detail-meta" id="detail-meta"></p>
      <a class="detail-checkout" id="detail-checkout" href="">begin checkout.</a>
    </div>

    <div class="detail-fallback detail-hidden" id="detail-fallback">
      <p class="detail-fallback">that product could not be found.</p>
      <p class="detail-fallback"><a href="shop.html">return to shop.</a></p>
    </div>
  </div>

  <script src="../js/shop_catalog.js"></script>
  <script>
    (function() {
      var catalog = window.LEXICONIC_SHOP_CATALOG;
      var detailCard = document.getElementById('detail-card');
      var detailImage = document.getElementById('detail-image');
      var detailImageLink = document.getElementById('detail-image-link');
      var detailMeta = document.getElementById('detail-meta');
      var detailCheckout = document.getElementById('detail-checkout');
      var detailFallback = document.getElementById('detail-fallback');
      var fallbackLink = detailFallback.querySelector('a');
      var params = new URLSearchParams(window.location.search);
      var productId = params.get('id');
      var category = params.get('category');
      var pack = params.get('pack');
      var product = catalog && productId ? catalog.getProductById(productId) : null;
      var returnParams = new URLSearchParams();

      if (category === 'apparel' || category === 'stickers') {
        returnParams.set('category', category);
      }

      if (category === 'stickers' && (pack === 'three' || pack === 'five' || pack === 'ten')) {
        returnParams.set('pack', pack);
      }

      fallbackLink.href = 'shop.html' + (returnParams.toString() ? '?' + returnParams.toString() : '');

      if (!product) {
        detailFallback.classList.remove('detail-hidden');
        return;
      }

      detailImage.src = product.imageSrc;
      detailImage.alt = product.label;
      detailImageLink.href = product.stripeUrl;
      detailImageLink.setAttribute('aria-label', product.label + ' checkout');
      detailMeta.textContent = product.label;
      detailCheckout.href = product.stripeUrl;
      detailCard.classList.remove('detail-hidden');
    })();
  </script>
</body>
</html>
